spring.application.name=Digital-Library-Management-System

# Server Configuration
server.port=8080
#server.address=0.0.0.0

# Database Configuration
spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME:localhost}:${RDS_PORT:3306}/${RDS_DB_NAME:digital_library}?serverTimezone=UTC
spring.datasource.username=${RDS_USERNAME:root}
spring.datasource.password=${RDS_PASSWORD:30stmars}
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# GitHub OAuth2 Configuration

spring.security.oauth2.client.registration.github.client-id=Ov23liFlB44dDoQjFZ51
spring.security.oauth2.client.registration.github.client-secret=c73508f8b5b27671178163d86b5bb0d742632694
spring.security.oauth2.client.registration.github.scope=user:email
spring.security.oauth2.client.provider.github.authorization-uri=https://github.com/login/oauth/authorize
spring.security.oauth2.client.provider.github.token-uri=https://github.com/login/oauth/access_token
spring.security.oauth2.client.provider.github.user-info-uri=https://api.github.com/user

# Connection bool

spring.datasource.hikari.connection-timeout=30000 
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=DigitalLibraryHikariCP
spring.datasource.hikari.max-lifetime=1800000 

# Debugging

logging.level.org.springframework.security=DEBUG




